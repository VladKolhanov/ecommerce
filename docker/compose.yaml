services:
  db:
    image: postgres:18-alpine
    container_name: nest_postgres_db
    restart: unless-stopped
    env_file:
      - docker/.env.docker.development
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nest_network

volumes:
  postgres_data:

networks:
  nest_network:
    driver: bridge
